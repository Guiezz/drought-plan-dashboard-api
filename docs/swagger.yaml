basePath: /api
definitions:
  controller.BackfillRequest:
    properties:
      data_inicio:
        type: string
    required:
    - data_inicio
    type: object
  controller.BackfillResponse:
    properties:
      message:
        example: Backfill concluído
        type: string
      registros:
        example: 1250
        type: integer
    type: object
  model.BalancoHidricoResumo:
    properties:
      balancoMensal:
        items:
          additionalProperties: true
          type: object
        type: array
      composicaoDemanda:
        items:
          additionalProperties: true
          type: object
        type: array
      ofertaDemanda:
        items:
          additionalProperties: true
          type: object
        type: array
    type: object
  model.DashboardResumo:
    properties:
      dataUltimaMedicao:
        type: string
      diasDesdeUltimaMudanca:
        type: integer
      estadoAtualSeca:
        type: string
      medidasRecomendadas:
        items:
          $ref: '#/definitions/model.PlanoAcaoResumo'
        type: array
      volumeAtualHm3:
        type: number
      volumePercentual:
        type: number
    type: object
  model.GatilhoMensalPGPS:
    properties:
      alerta_hm3:
        type: number
      mes_nome:
        type: string
      mes_num:
        type: integer
      normal_hm3:
        type: number
      seca_hm3:
        type: number
      seca_severa_hm3:
        type: number
    type: object
  model.GatilhosPGPSResponse:
    properties:
      capacidade_hm3:
        type: number
      gatilhos:
        items:
          $ref: '#/definitions/model.GatilhoMensalPGPS'
        type: array
      nome_reservatorio:
        type: string
      reservatorio_id:
        type: integer
    type: object
  model.GraficoVolumeData:
    properties:
      Data:
        description: Frontend espera "Data" com D maiúsculo
        type: string
      meta1:
        type: number
      meta2:
        type: number
      meta3:
        type: number
      volume:
        type: number
    type: object
  model.HistoricoTabela:
    properties:
      Data:
        description: 'Ex: "25/12/2023"'
        type: string
      Estado de Seca:
        description: Com espaços
        type: string
      Volume (hm3):
        description: Com unidade e parênteses
        type: number
    type: object
  model.PlanoAcaoResumo:
    properties:
      acao:
        type: string
      descricao:
        type: string
      responsaveis:
        type: string
    type: object
  model.Reservatorio:
    properties:
      capacidade_hm3:
        type: number
      codigo_funceme:
        type: string
      descricao:
        type: string
      id:
        type: integer
      lat:
        type: number
      long:
        type: number
      municipio:
        type: string
      nome:
        type: string
      nome_imagem:
        type: string
      nome_imagem_usos:
        type: string
    type: object
  model.ReservatorioDetalhes:
    properties:
      descricao:
        type: string
      id:
        type: integer
      lat:
        type: number
      long:
        type: number
      municipio:
        type: string
      nome:
        type: string
      url_imagem:
        type: string
      url_imagem_usos:
        type: string
    type: object
  model.Responsavel:
    properties:
      cargo:
        type: string
      grupo:
        type: string
      id:
        type: integer
      nome:
        type: string
      organizacao:
        type: string
      reservatorio_id:
        type: integer
      setor:
        type: string
    type: object
  model.UsoAgua:
    properties:
      id:
        type: integer
      reservatorio_id:
        type: integer
      uso:
        type: string
      vazao_escassez:
        type: number
      vazao_normal:
        type: number
    type: object
  simulador.CenarioSimulacao:
    properties:
      anos:
        description: '[1915] ou [2012,2013,2014,2015,2016,2017]'
        items:
          type: integer
        type: array
      nome:
        description: '"Seca 1915", "2012-2017", etc.'
        type: string
    type: object
  simulador.SimAcude:
    properties:
      capacidade_m3:
        description: Coluna CAPAC (m³)
        type: number
      codigo:
        description: Coluna COD
        type: integer
      estacao_evap_id:
        description: Coluna Est. Evap.
        type: integer
      municipio:
        description: Coluna MUNICIPIO
        type: string
      nome:
        description: Coluna CORPO
        type: string
    type: object
  simulador.SimulacaoRequest:
    properties:
      cenarios:
        description: 'Multi-cenário: se preenchido, executa simulação para cada cenário'
        items:
          $ref: '#/definitions/simulador.CenarioSimulacao'
        type: array
      data_fim:
        type: string
      data_inicio:
        type: string
      demandas_mensais:
        description: Opcionais (se quiser simular cenários manuais)
        items:
          type: number
        type: array
      reservatorio_id:
        type: integer
      usar_media_historica:
        description: Se true, usa médias históricas do banco. Se false, usa os arrays
          abaixo.
        type: boolean
      volume_inicial:
        description: Em hm³
        type: number
    type: object
  simulador.SimulacaoResponse:
    properties:
      frequencia_nao_atendida:
        type: number
      resultados:
        items:
          $ref: '#/definitions/simulador.SimulacaoResultado'
        type: array
      volume_final:
        type: number
    type: object
  simulador.SimulacaoResultado:
    properties:
      afluencia_hm3:
        type: number
      alerta:
        type: string
      data:
        type: string
      evaporacao_hm3:
        type: number
      retirada_hm3:
        type: number
      vertimento_hm3:
        type: number
      volume_final_hm3:
        type: number
      volume_inicial_hm3:
        type: number
    type: object
host: localhost:8000
info:
  contact:
    email: guilhermebessanojosaaraujo@gmail.com
    name: Suporte
  description: API para gerenciamento e monitoramento de reservatórios hídricos do
    Ceará.
  termsOfService: http://swagger.io/terms/
  title: API do dashboard de apoio a decisão dos planos de secas do estado do Ceará
  version: "1.0"
paths:
  /api/simulacao/acudes:
    get:
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/simulador.SimAcude'
            type: array
      summary: Lista açudes disponíveis para simulação
      tags:
      - Simulacao
  /api/simulacao/anos:
    get:
      parameters:
      - description: ID do reservatório
        in: query
        name: reservatorio_id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                type: integer
              type: array
            type: object
      summary: Lista anos com vazão cadastrada para um açude
      tags:
      - Simulacao
  /api/simulacao/run:
    post:
      consumes:
      - application/json
      description: Calcula o balanço hídrico mensal com base em dados históricos
      parameters:
      - description: Parâmetros da Simulação
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/simulador.SimulacaoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/simulador.SimulacaoResponse'
      summary: Executa a simulação hídrica
      tags:
      - Simulacao
  /reservatorios:
    get:
      description: Retorna a lista de todos os reservatórios cadastrados
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Reservatorio'
            type: array
      summary: Lista reservatórios
      tags:
      - Reservatórios
  /reservatorios/{reservatorioId}/dashboard/summary:
    get:
      description: Retorna volume atual, status de seca e resumo de ações recomendadas
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DashboardResumo'
      summary: Resumo do Dashboard
      tags:
      - Dashboard
  /reservatorios/{reservatorioId}/dashboard/volume-chart:
    get:
      description: Retorna série histórica de volume e linhas de meta (V.O.)
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.GraficoVolumeData'
            type: array
      summary: Dados do Gráfico de Volume
      tags:
      - Gráficos
  /reservatorios/{reservatorioId}/funceme-backfill:
    post:
      consumes:
      - application/json
      description: Busca dados históricos de volume desde a data informada e insere
        no banco, evitando duplicatas. Requer token de administrador.
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      - description: Data de início no formato YYYY-MM-DD
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.BackfillRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.BackfillResponse'
        "400":
          description: data_inicio inválido ou ausente
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: token não fornecido
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: sem permissão
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: erro interno
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Backfill de dados históricos da FUNCEME
      tags:
      - Admin
  /reservatorios/{reservatorioId}/gatilhos-pgps:
    get:
      description: Retorna os gatilhos mensais do PGPS (meta1v, meta2v, meta3v) em
        hm³ para cada mês
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.GatilhosPGPSResponse'
      summary: Gatilhos do PGPS
      tags:
      - Reservatórios
  /reservatorios/{reservatorioId}/history:
    get:
      description: Retorna tabela completa de monitoramento com status de seca calculado
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.HistoricoTabela'
            type: array
      summary: Histórico Tabular
      tags:
      - Monitoramento
  /reservatorios/{reservatorioId}/identification:
    get:
      description: Retorna dados cadastrais, URLs de imagens e localização
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ReservatorioDetalhes'
      summary: Identificação e Localização
      tags:
      - Reservatórios
  /reservatorios/{reservatorioId}/responsibles:
    get:
      description: Lista as entidades e pessoas responsáveis pelo reservatório
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Responsavel'
            type: array
      summary: Responsáveis
      tags:
      - Cadastros Auxiliares
  /reservatorios/{reservatorioId}/water-balance:
    get:
      description: 'Retorna dados formatados para os 3 gráficos: Balanço Mensal, Demanda
        e Oferta'
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.BalancoHidricoResumo'
      summary: Gráficos de Balanço Hídrico
      tags:
      - Gráficos
  /reservatorios/{reservatorioId}/water-uses:
    get:
      description: Lista os usos e vazões cadastradas
      parameters:
      - description: ID do Reservatório
        in: path
        name: reservatorioId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.UsoAgua'
            type: array
      summary: Usos da Água
      tags:
      - Cadastros Auxiliares
swagger: "2.0"
